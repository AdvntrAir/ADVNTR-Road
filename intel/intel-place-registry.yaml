# ADVNTR Road — Intel Pack Place Registry
# v0.1 · July 2026
#
# ONE FILE, FOUR JOBS:
#   1. Tag hub generation      → /intel/tag/[slug]/
#   2. affects_guides matching → which published guides a story touches
#   3. Guide-update queue      → tasks generated when a story hits a published guide
#   4. CTA resolution          → which guide/waitlist a weekly edition points at
#
# GOVERNANCE
#   The weekly Stage A run may PROPOSE new places via `proposed_tags`.
#   It may NOT mint them. Stage B fails validation on an unknown place slug.
#   Additions to this file are deliberate, in-repo, human commits.
#   Expected cadence: ~4 edits/year.
#
# SLUG RULE
#   Where a guide exists, `slug` MUST equal the guide slug exactly.
#   This is what makes one lookup serve all four jobs. Do not diverge.

meta:
  version: "0.1"
  updated: "2026-07-22"

# ---------------------------------------------------------------------------
# CTA FALLBACK LADDER
# Stage B walks this top-down. First match wins.
# ---------------------------------------------------------------------------
cta_rules:
  selection:
    # Weighted by story tier, summed per place. Highest total anchors the edition.
    tier_weights:
      lead: 3
      feature: 2
      brief: 1
    # Ties break toward the higher rung of the ladder (published > in-progress > roadmap).
    tiebreak: guide_status_rank

  ladder:
    # guide_status values MIRROR apps/web/src/data/guides.ts exactly.
    - status: published
      guide_type: free
      cta_kind: free_guide
      copy_hint: "Route to cta_href (/r/ redirect). No purchase ask on a free anchor."
    - status: published
      guide_type: paid
      cta_kind: gumroad
      copy_hint: "Only valid once a real Gumroad URL exists. None do today."
    - status: paid-guide-coming
      cta_kind: waitlist
      copy_hint: "Guide is built. Ask for the email, not the sale."
    - status: pending-verification
      cta_kind: waitlist
      copy_hint: >
        Held from sale deliberately. Honest framing only — do not imply it is
        purchasable. Saying why it is held is on-brand.
    - status: in-progress
      cta_kind: waitlist_dated
      copy_hint: "Name the ship month honestly."
    - status: coming-soon
      cta_kind: waitlist
    - status: roadmap
      cta_kind: waitlist
      copy_hint: >
        Waitlist capture, NOT a generic guides link. A generic link from a
        place-heavy edition converts near zero. The waitlist converts AND
        produces roadmap demand data.
    - status: out-of-scope
      cta_kind: generic
    - status: _no_place_tag
      cta_kind: generic

  # HARD SUPPRESSION — brand protection, not a preference.
  suppression:
    # A place cannot anchor the edition CTA if its highest-weighted story
    # matches any of these. Selection falls through to the next-highest place.
    conditions:
      - topic: safety
        severity_gte: high
      - involves_fatality: true
      - involves_injury: true
      - involves_search_and_rescue: true
      - involves_active_evacuation: true
    # If EVERY candidate place is suppressed, the edition renders with NO CTA.
    # This is a valid, expected outcome. Do not fall back to generic.
    all_suppressed_behavior: omit_cta

  placement:
    max_cta_per_edition: 1
    web_positions: [after_lead_story, edition_footer]   # same CTA, two placements
    newsletter_positions: [footer]
    social_positions: []   # social CTA is always just the web edition link

  utm:
    template: "?utm_source=intel&utm_medium={surface}&utm_campaign=intel-{edition_date}&utm_content={place_slug}"
    surfaces: [web, newsletter, social]

# ---------------------------------------------------------------------------
# PLACES
# guide_status: published | in-progress | roadmap | out-of-scope
# guide_type:   free | paid          (required when status = published)
# ---------------------------------------------------------------------------
places:

  # --- LIVE ON SITE ---------------------------------------------------------
  # guide_status MUST mirror apps/web/src/data/guides.ts. When a status changes
  # there, change it here. This is the CTA source of truth.
  #
  # NOTE: no Gumroad products exist yet. Every paid guide currently routes to
  # #subscribe on the site, so cta_kind: gumroad must not be used until a real
  # product URL exists.

  - slug: olympic-national-park
    label: Olympic National Park
    aliases: ["Olympic NP", "Olympic Peninsula", "Hoh Rainforest", "Hurricane Ridge", "Rialto"]
    guide_status: published
    guide_type: free            # free-forever anchor
    guide_url: /guides/olympic-national-park/
    cta_href: /r/olympic-np-free-guide   # matches guides.ts; no email gate exists yet
    build_dir: olympic-np       # PDF repo dir — differs from slug
    region: pacific-northwest

  - slug: oregon-coast
    label: Oregon Coast (US-101)
    aliases: ["US-101", "Highway 101 Oregon", "Cannon Beach", "Astoria"]
    guide_status: published
    guide_type: free            # free-forever anchor
    guide_url: /guides/oregon-coast/
    cta_href: /r/oregon-coast-free-guide
    build_dir: oregon-coast
    region: pacific-northwest

  - slug: north-cascades-national-park
    label: North Cascades National Park
    aliases: ["North Cascades", "Highway 20", "Diablo Lake", "Stehekin", "Cascade Pass"]
    guide_status: paid-guide-coming    # built and verified; no purchase link yet
    guide_url: /guides/north-cascades-national-park/
    cta_href: "#subscribe"
    build_dir: north-cascades
    region: pacific-northwest

  - slug: mount-rainier-national-park
    label: Mount Rainier National Park
    aliases: ["Mount Rainier", "Mt Rainier", "Paradise", "Sunrise", "Ohanapecosh", "Fairfax Bridge"]
    guide_status: pending-verification  # held from sale pending 2026 closure re-verification
    guide_url: /guides/mount-rainier-national-park/
    cta_href: "#subscribe"
    build_dir: mount-rainier-np
    region: pacific-northwest

  - slug: olympic-peninsula-loop
    label: Olympic Peninsula Loop
    guide_status: coming-soon
    guide_url: /guides/olympic-peninsula-loop/
    cta_href: "#subscribe"
    region: pacific-northwest

  - slug: columbia-river-gorge
    label: Columbia River Gorge
    aliases: ["Historic Columbia River Highway", "Multnomah Falls", "Hood River"]
    guide_status: coming-soon
    guide_url: /guides/columbia-river-gorge/
    cta_href: "#subscribe"
    region: pacific-northwest

  # --- IN PROGRESS (not yet on the site) -----------------------------------
  - slug: crater-lake-national-park
    label: Crater Lake National Park
    aliases: ["Crater Lake", "Rim Drive"]
    guide_status: in-progress
    ship_month: "2026-08"
    build_dir: crater-lake-np
    region: pacific-northwest

  # --- ROADMAP -------------------------------------------------------------
  - slug: route-66-west
    label: Route 66 West
    aliases: ["Route 66", "Historic Route 66", "Mother Road"]
    guide_status: roadmap
    ship_month: "2026-11"       # HARD DEADLINE — centennial, Nov 11 2026
    region: southwest

  # --- ROADMAP — high-news-volume parks -----------------------------------
  # These generate intel traffic whether or not a guide exists. Registering
  # them early means their tag hubs start accumulating authority NOW, and a
  # waitlist starts collecting demand data before the guide is scheduled.
  - slug: yellowstone-national-park
    label: Yellowstone National Park
    aliases: ["Yellowstone", "Old Faithful", "Lamar Valley"]
    guide_status: roadmap
    region: greater-yellowstone

  - slug: grand-teton-national-park
    label: Grand Teton National Park
    aliases: ["Grand Teton", "Tetons", "Jackson Hole"]
    guide_status: roadmap
    region: greater-yellowstone

  - slug: glacier-national-park
    label: Glacier National Park
    aliases: ["Glacier NP", "Going-to-the-Sun Road"]
    guide_status: roadmap
    region: northern-rockies

  - slug: zion-national-park
    label: Zion National Park
    aliases: ["Zion", "Angels Landing", "The Narrows"]
    guide_status: roadmap
    region: desert-southwest

  - slug: grand-canyon-national-park
    label: Grand Canyon National Park
    aliases: ["Grand Canyon", "South Rim", "North Rim"]
    guide_status: roadmap
