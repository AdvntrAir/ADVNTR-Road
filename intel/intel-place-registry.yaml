  # --- SYSTEM-WIDE ---------------------------------------------------------
  # Stories about the park system as a whole: NPS budget, federal fee policy,
  # America the Beautiful pass changes, agency staffing, public lands bills.
  # These are frequently the most important stories of a given week but have
  # no single place anchor. They CANNOT anchor a CTA — they fall through.
  - slug: national-park-system
    label: National Park System
    aliases: ["NPS", "National Park Service", "public lands", "Department of the Interior"]
    guide_status: out-of-scope
    region: system-wide
    cta_eligible: false

# ---------------------------------------------------------------------------
# CLOSED TAG VOCABULARIES
# Stage B fails validation on any value not listed here.
# ---------------------------------------------------------------------------
topics:
  - closures
  - wildfire
  - weather
  - wildlife
  - fees
  - reservations
  - legislation
  - infrastructure
  - crowding
  - conservation
  - safety
  - access

actions:
  - plan-change      # reader must change an existing plan
  - book-now         # time-sensitive booking window
  - awareness-only   # context, no action required
