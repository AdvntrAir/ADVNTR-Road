name: Build & Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info \
            fonts-liberation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Stub font directories (CI uses system fonts)
        run: |
          mkdir -p "design_system/fonts/Inter,Playfair_Display,Space_Mono,Titan_One"
          mkdir -p design_system/assets/fonts

      - name: Build HTML previews
        run: |
          mkdir -p _site
          for guide in guides/*/; do
            slug=$(basename "$guide")
            echo "Building $slug..."
            python build.py --guide "$slug" --no-maps --html-only 2>&1 || true
            if [ -f "output/${slug}.html" ]; then
              cp "output/${slug}.html" "_site/${slug}.html"
              echo "  -> _site/${slug}.html"
            fi
          done

      - name: Build index page
        run: |
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>ADVNTR Road — Guide Previews</title>
            <style>
              body { font-family: sans-serif; max-width: 640px; margin: 60px auto; color: #222; padding: 0 20px; }
              h1 { font-size: 1.4em; margin-bottom: 8px; }
              p { color: #666; font-size: 0.9em; }
              ul { padding: 0; list-style: none; margin-top: 24px; }
              li { margin: 12px 0; }
              a { color: #c0441e; text-decoration: none; font-size: 1.05em; font-weight: 600; }
              a:hover { text-decoration: underline; }
              .note { font-size: 0.8em; color: #999; margin-top: 4px; }
            </style>
          </head>
          <body>
            <h1>ADVNTR Road — Guide Previews</h1>
            <p>HTML layout preview only — fonts may differ from the final PDF.</p>
            <ul id="guides"></ul>
            <script>
              const guides = [];
          HTMLEOF

          for f in _site/*.html; do
            slug=$(basename "$f" .html)
            [ "$slug" = "index" ] && continue
            echo "    guides.push('${slug}');" >> _site/index.html
          done

          cat >> _site/index.html << 'HTMLEOF2'
              const ul = document.getElementById('guides');
              guides.forEach(g => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${g}.html">${g}</a>`;
                ul.appendChild(li);
              });
            </script>
          </body>
          </html>
          HTMLEOF2

      - name: Deploy to Netlify
        if: github.ref == 'refs/heads/main'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli --silent
          netlify deploy --dir=_site --prod --message="${{ github.event.head_commit.message }}"
