name: Build & Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info \
            fonts-liberation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Copy font stubs (CI uses system fonts)
        run: |
          mkdir -p design_system/fonts
          mkdir -p "design_system/fonts/Inter,Playfair_Display,Space_Mono,Titan_One"
          mkdir -p design_system/assets/fonts

      - name: Build HTML previews
        run: |
          mkdir -p _site
          for guide in guides/*/; do
            slug=$(basename "$guide")
            python build.py --guide "$slug" --no-maps --html-only 2>&1 || true
            if [ -f "output/${slug}.html" ]; then
              cp "output/${slug}.html" "_site/${slug}.html"
            fi
          done

      - name: Build index page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>ADVNTR Road — Guide Previews</title>
          <style>body{font-family:sans-serif;max-width:600px;margin:60px auto;color:#222}
          a{color:#c0441e;text-decoration:none;font-size:1.1em}
          a:hover{text-decoration:underline}li{margin:12px 0}</style></head>
          <body><h1>ADVNTR Road Guide Previews</h1><ul>
          EOF
          for f in _site/*.html; do
            slug=$(basename "$f" .html)
            [ "$slug" = "index" ] && continue
            echo "<li><a href=\"${slug}.html\">${slug}</a></li>" >> _site/index.html
          done
          echo "</ul></body></html>" >> _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
