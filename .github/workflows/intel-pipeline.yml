# .github/workflows/intel-pipeline.yml
#
# ADVNTR Road — Weekly Intel Pack.
#
# ARCHITECTURE (v0.3): this workflow does NOT deploy. It writes a content file
# into the Astro intel collection and commits it. Astro builds, Netlify deploys
# on push — the same path the site already uses.
#
# This deliberately removes the `netlify deploy --prod` step from earlier
# versions. A --prod deploy REPLACES the entire published site; it does not add
# pages at a path. That was a defect, and it also collided with preview.yml.

name: Intel Pack

on:
  # DISABLED until Stage B exists. Uncomment when validate.py and
  # write_edition.py are built and one edition has published cleanly.
  # schedule:
  #   - cron: "0 14 * * 1"   # Mondays 14:00 UTC (~09:00 CT)
  workflow_dispatch:
    inputs:
      edition_date:
        description: "Edition date (YYYY-MM-DD). Blank = Monday on or before today."
        required: false
        type: string
      dry_run:
        description: "Research + validate, but do NOT commit the content file"
        required: false
        type: boolean
        default: true
      skip_research:
        description: "Reuse intel/incoming/ instead of a fresh API call (free debugging)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  intel:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r intel/requirements.txt

      # ---------------------------------------------------------------
      # STAGE A — the only LLM call in this pipeline
      # ---------------------------------------------------------------
      - name: Stage A — research
        id: research
        if: ${{ inputs.skip_research != true }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INTEL_MODEL: ${{ vars.INTEL_MODEL || 'claude-opus-4-8' }}
        run: |
          python intel/stage_a_research.py \
            --out ./intel/incoming/ \
            --archive ./apps/web/src/content/intel/ \
            --edition-date "${{ inputs.edition_date }}"

      # Uploaded BEFORE validation, so a failed run still leaves something to read.
      - name: Upload raw edition
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intel-raw-${{ github.run_number }}
          path: intel/incoming/
          retention-days: 30

      # ---------------------------------------------------------------
      # STAGE B — deterministic. Zero AI tokens past this point.
      # ---------------------------------------------------------------
      - name: Validate
        run: |
          python intel/validate.py \
            --edition ./intel/incoming/ \
            --registry ./intel/intel-place-registry.yaml \
            --guides ./apps/web/src/data/guides.ts \
            --archive ./apps/web/src/content/intel/ \
            --report ./intel/out/intel_build_report.md

      # Resolves ctaPlaceSlug / ctaSuppressed and writes the final content file.
      - name: Resolve CTA and write content file
        id: write_edition
        run: |
          python intel/write_edition.py \
            --edition ./intel/incoming/ \
            --registry ./intel/intel-place-registry.yaml \
            --out ./apps/web/src/content/intel/ \
            --queue ./intel/out/intel_guide_updates.md

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intel-build-${{ github.run_number }}
          path: intel/out/
          retention-days: 30

      # ---------------------------------------------------------------
      # PUBLISH — commit only. Astro + Netlify handle the rest.
      # The file lands with status: "draft"; a human promotes it.
      # ---------------------------------------------------------------
      - name: Commit edition
        id: commit_edition
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "intel-bot"
          git config user.email "intel@advntr.io"
          git add apps/web/src/content/intel/
          if git diff --cached --quiet; then
            echo "nothing to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Intel Pack: edition ${{ steps.write_edition.outputs.edition_date }} (draft)"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # ---------------------------------------------------------------
      # NOTIFY — only after a real commit, never on a dry run. The issue
      # is the human trigger for Gate 4 (read the takes, flip draft ->
      # published); the pipeline itself never promotes an edition.
      # ---------------------------------------------------------------
      - name: Open draft-ready issue
        if: ${{ inputs.dry_run != true && steps.commit_edition.outputs.committed == 'true' }}
        uses: actions/github-script@v7
        env:
          SUMMARY_JSON: ${{ steps.write_edition.outputs.summary_json }}
        with:
          script: |
            const summary = JSON.parse(process.env.SUMMARY_JSON);
            const { owner, repo } = context.repo;

            const label = "intel";
            try {
              await github.rest.issues.createLabel({
                owner, repo, name: label,
                color: "0E8A16",
                description: "Weekly Intel Pack edition ready for human review",
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = label already exists, fine
            }

            const tiers = summary.tier_counts || {};
            const tierLine = `lead: ${tiers.lead || 0}, feature: ${tiers.feature || 0}, brief: ${tiers.brief || 0}`;

            const ctaLine = summary.cta_suppressed
              ? "**Suppressed** — every candidate place this week was flagged (safety/fatality/injury/SAR/evacuation). No CTA renders."
              : summary.cta_place_slug
                ? `\`${summary.cta_place_slug}\``
                : "(none scored)";

            const hs = summary.harvest_stats || {};
            const harvestLines = [
              `- Candidates found: ${hs.candidatesFound ?? "?"}`,
              `- Cleared verification: ${hs.clearedVerification ?? "?"}`,
              `- Dropped, single source: ${hs.droppedSingleSource ?? "?"}`,
              `- Dropped, outside window: ${hs.droppedOutsideWindow ?? "?"}`,
              `- Dropped, duplicate: ${hs.droppedDuplicate ?? "?"}`,
              `- Dropped, prior edition: ${hs.droppedPriorEdition ?? "?"}`,
            ].join("\n");

            const fileUrl = `https://github.com/${owner}/${repo}/blob/main/${summary.content_file_path}`;

            const body = [
              `**${summary.title}**`,
              "",
              "| | |",
              "|---|---|",
              `| Stories by tier | ${tierLine} |`,
              `| CTA place | ${ctaLine} |`,
              `| Thin week | ${summary.thin_week ? "yes" : "no"} |`,
              "",
              "**Harvest funnel**",
              harvestLines,
              "",
              `**File:** ${fileUrl}`,
              "",
              "- [ ] Read the takes — do they still pass the swap test?",
              "- [ ] Check any affectsGuides entries",
              "- [ ] Flip status: draft -> published",
            ].join("\n");

            await github.rest.issues.create({
              owner, repo,
              title: `Intel Pack draft ready — ${summary.edition_date}`,
              body,
              labels: [label],
            });

      - name: Failure notice
        if: failure()
        run: |
          echo "::error::Intel pipeline failed. Download intel-raw-${{ github.run_number }}"
          echo "::error::and intel-build-${{ github.run_number }} to diagnose."
