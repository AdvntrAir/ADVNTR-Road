  - {location: Watchman Peak Lookout, moment: The late-evening shadow of the western caldera rim stretching like a dark expanding blue wedge across the glassy water.}
  - {location: The Pinnacles Overlook, moment: Early morning sun raking across jagged grey ash chimneys casting long gothic shadows down the canyon floor.}
