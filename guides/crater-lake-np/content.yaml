cell_service:
  general: Spotty to none
  with_signal: [Rim Village parking areas, Crater Lake Lodge porch]
  without_signal: [Canyon basins, Pinnacles Road, Remote East Rim segments]
  offline_tools: [Gaia GPS, AllTrails Pro, NPS app offline profile]

checklist:
  - Confirm your credit or debit card works -- entrance gates are cashless with no exceptions.
  - Pre-download offline topo maps and campground layout -- cell service disappears past Rim Village.
  - Check nps.gov/crla/planyourvisit/conditions.htm for East Rim Drive construction delays before you arrive.
  - "The Cleetwood Cove Trail is closed through 2028 -- no lake access, no boat tours until at least summer 2029."
  - Buy groceries and tow-vehicle fuel in Klamath Falls or Medford -- the in-park store carries mountain markups.
  - Book an America the Beautiful Pass in advance to skip the entrance-lane transaction.
  - Pack wool base layers and windproof outerwear even for high summer -- the rim sits at 7,000-8,000 ft.
  - Reserve Mazama Campground the moment your booking window opens -- July-October slots go in hours.

